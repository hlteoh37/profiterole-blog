<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tip Calculator — Split Bills & Calculate Tips Free</title>
  <meta name="description" content="Calculate tips instantly. Split bills between multiple people. Choose tip percentage or enter custom amount. Free, no login.">
  <link rel="canonical" href="https://hlteoh37.github.io/profiterole-blog/finance/tip-calculator/">
  <meta property="og:title" content="Tip Calculator — Split Bills & Calculate Tips Free">
  <meta property="og:description" content="Calculate tips instantly. Split bills between multiple people. Free, no login.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://hlteoh37.github.io/profiterole-blog/finance/tip-calculator/">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg:#0d1117;--card:#161b22;--border:#30363d;--accent:#58a6ff;--muted:#8b949e;--green:#3fb950;--text:#e6edf3;--font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; }
    body { background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px;line-height:1.6;min-height:100vh;padding:0 0 80px; }
    a { color:var(--accent);text-decoration:none; }
    a:hover { text-decoration:underline; }
    header { border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;gap:12px; }
    header .logo { font-weight:700;font-size:1.05rem;color:var(--text);letter-spacing:-0.3px; }
    header .logo span { color:var(--accent); }
    .back-link { color:var(--muted);font-size:0.85rem; }
    .container { max-width:680px;margin:0 auto;padding:32px 20px; }
    .page-title { font-size:1.75rem;font-weight:700;margin:12px 0 6px;letter-spacing:-0.5px; }
    .page-subtitle { color:var(--muted);font-size:0.95rem;margin-bottom:28px; }
    .card { background:var(--card);border:1px solid var(--border);border-radius:10px;padding:24px;margin-bottom:24px; }
    .card-title { font-size:0.8rem;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:18px; }
    .fields-grid { display:grid;grid-template-columns:1fr 1fr;gap:16px; }
    @media (max-width:520px) { .fields-grid { grid-template-columns:1fr; } .page-title { font-size:1.4rem; } }
    .field { display:flex;flex-direction:column;gap:6px; }
    label { font-size:0.85rem;color:var(--muted);font-weight:500; }
    input[type="number"],select { background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:var(--font);font-size:0.95rem;padding:9px 12px;width:100%;transition:border-color 0.15s;-webkit-appearance:none;appearance:none; }
    input[type="number"]:focus,select:focus { outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(88,166,255,0.12); }
    .tip-buttons { display:flex;gap:8px;flex-wrap:wrap;margin-top:8px; }
    .tip-btn { background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--muted);font-family:var(--font);font-size:0.85rem;font-weight:600;padding:7px 14px;cursor:pointer;transition:border-color 0.15s,color 0.15s; }
    .tip-btn:hover,.tip-btn.active { border-color:var(--accent);color:var(--accent); }
    .calc-btn { margin-top:20px;background:var(--accent);color:#0d1117;border:none;border-radius:6px;font-family:var(--font);font-size:0.95rem;font-weight:600;padding:11px 28px;cursor:pointer;transition:opacity 0.15s;width:100%; }
    .calc-btn:hover { opacity:0.88; }
    #results { display:none; }
    .results-grid { display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px; }
    @media (max-width:520px) { .results-grid { grid-template-columns:1fr 1fr; } }
    .result-card { background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:16px;text-align:center; }
    .result-card.primary { border-color:var(--green);box-shadow:0 0 0 1px rgba(63,185,80,0.15); }
    .result-label { font-size:0.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em;font-weight:600;margin-bottom:8px; }
    .result-value { font-size:1.5rem;font-weight:700;color:var(--text);letter-spacing:-0.5px; }
    .result-card.primary .result-value { font-size:1.9rem;color:var(--green); }
    .footer { margin-top:40px;padding-top:20px;border-top:1px solid #21262d;font-size:0.8rem;color:#6e7681;text-align:center; }
    .footer a { color:var(--accent); }
    .coffee-btn { position:fixed;bottom:24px;right:24px;z-index:100;background:#ffdd00;color:#000;font-size:0.8rem;font-weight:700;padding:10px 16px;border-radius:24px;text-decoration:none;box-shadow:0 4px 16px rgba(0,0,0,0.4);transition:opacity 0.15s; }
    .coffee-btn:hover { opacity:0.9;text-decoration:none; }
  </style>
</head>
<body>
  <header>
    <div class="logo">Profiterole <span>Finance</span></div>
    <span style="color:var(--border);margin:0 4px">|</span>
    <a href="/profiterole-blog/finance/" class="back-link">← All Calculators</a>
  </header>
  <div class="container">
    <h1 class="page-title">Tip Calculator</h1>
    <p class="page-subtitle">Calculate tip amount and split bills between multiple people. Instant, no login.</p>

    <div class="card">
      <div class="card-title">Bill Details</div>
      <div class="fields-grid">
        <div class="field">
          <label>Bill Amount ($)</label>
          <input type="number" id="billAmount" value="50" min="0" step="0.01">
        </div>
        <div class="field">
          <label>Number of People</label>
          <input type="number" id="numPeople" value="2" min="1" step="1">
        </div>
        <div class="field" style="grid-column:1/-1">
          <label>Tip Percentage (%)</label>
          <div class="tip-buttons">
            <button class="tip-btn" onclick="setTip(10)">10%</button>
            <button class="tip-btn active" onclick="setTip(15)">15%</button>
            <button class="tip-btn" onclick="setTip(18)">18%</button>
            <button class="tip-btn" onclick="setTip(20)">20%</button>
            <button class="tip-btn" onclick="setTip(25)">25%</button>
          </div>
          <input type="number" id="tipPct" value="15" min="0" max="100" step="1" style="margin-top:8px;" oninput="clearActive()">
        </div>
      </div>
      <button class="calc-btn" onclick="calculate()">Calculate Tip</button>
    </div>

    <div id="results">
      <div class="card">
        <div class="card-title">Results</div>
        <div class="results-grid">
          <div class="result-card">
            <div class="result-label">Tip Amount</div>
            <div class="result-value" id="tipAmount">—</div>
          </div>
          <div class="result-card primary">
            <div class="result-label">Total Bill</div>
            <div class="result-value" id="totalBill">—</div>
          </div>
          <div class="result-card">
            <div class="result-label">Per Person</div>
            <div class="result-value" id="perPerson">—</div>
          </div>
        </div>
        <div class="results-grid" style="grid-template-columns:1fr 1fr">
          <div class="result-card">
            <div class="result-label">Bill Per Person</div>
            <div class="result-value" id="billPerPerson">—</div>
          </div>
          <div class="result-card">
            <div class="result-label">Tip Per Person</div>
            <div class="result-value" id="tipPerPerson">—</div>
          </div>
        </div>
      </div>
    </div>

    <div class="footer">
      <p>Built by <a href="https://hlteoh37.github.io/profiterole-blog/">Profiterole</a> · <a href="/profiterole-blog/finance/">More Calculators</a></p>
    </div>
  </div>

  <a href="https://buymeacoffee.com/gl89tu25lp" target="_blank" class="coffee-btn">Buy me a coffee ☕</a>

  <script>
    function fmt(n) { return '$' + n.toFixed(2); }

    function setTip(pct) {
      document.getElementById('tipPct').value = pct;
      document.querySelectorAll('.tip-btn').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
    }

    function clearActive() {
      document.querySelectorAll('.tip-btn').forEach(b => b.classList.remove('active'));
    }

    function calculate() {
      const bill = parseFloat(document.getElementById('billAmount').value) || 0;
      const pct = parseFloat(document.getElementById('tipPct').value) || 0;
      const people = Math.max(1, parseInt(document.getElementById('numPeople').value) || 1);

      const tip = bill * pct / 100;
      const total = bill + tip;
      const perPerson = total / people;
      const billPer = bill / people;
      const tipPer = tip / people;

      document.getElementById('tipAmount').textContent = fmt(tip);
      document.getElementById('totalBill').textContent = fmt(total);
      document.getElementById('perPerson').textContent = fmt(perPerson);
      document.getElementById('billPerPerson').textContent = fmt(billPer);
      document.getElementById('tipPerPerson').textContent = fmt(tipPer);
      document.getElementById('results').style.display = 'block';
    }

    calculate();
  </script>
</body>
</html>
